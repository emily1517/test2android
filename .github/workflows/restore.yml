name: Android - Restore Browser History (lightweight)
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag of the backup to restore (e.g. history-backup-123456)'
        required: true

permissions:
  contents: read

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34

      - name: Create AVD (if not cached)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo "AVD created."

      - name: Download backup release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p restore
          gh release download "${{ github.event.inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "history_before.db" \
            --output restore/history_before.db
          gh release download "${{ github.event.inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "before.png" \
            --output restore/before.png
          ls -lh restore/

      - name: Write restore-and-verify script
        run: |
          cat > verify.sh << 'EOF'
          #!/bin/bash
          set -e
          adb devices
          adb wait-for-device
          adb root
          adb wait-for-device

          echo "=== Force-stopping browser before restoring its data ==="
          adb shell am force-stop com.android.browser

          echo "=== Pushing backed-up history DB into place ==="
          adb push restore/history_before.db /data/data/com.android.browser/databases/browser2.db
          adb shell chown $(adb shell stat -c '%U:%G' /data/data/com.android.browser) /data/data/com.android.browser/databases/browser2.db || true

          echo "=== Relaunching browser to reload restored history ==="
          adb shell am start -a android.intent.action.VIEW -n com.android.browser/.BrowserActivity -d "'about:blank'"
          sleep 5

          echo "=== Pulling history DB after restore for comparison ==="
          mkdir -p restore
          adb pull /data/data/com.android.browser/databases/browser2.db restore/history_after.db

          echo "=== Screenshot after restore ==="
          adb shell screencap -p /sdcard/after.png
          adb pull /sdcard/after.png restore/after.png
          EOF
          chmod +x verify.sh

      - name: Boot fresh emulator and restore
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash ${{ github.workspace }}/verify.sh

      - name: Compare history DBs before vs after
        run: |
          if cmp -s restore/history_before.db restore/history_after.db; then
            echo "PASS: history database identical after restore"
          else
            echo "FAIL: history database differs after restore"
            ls -l restore/history_before.db restore/history_after.db
            exit 1
          fi

      - name: Upload restore verification (screenshots) as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: restore-verification
          path: |
            restore/before.png
            restore/after.png
            restore/history_before.db
            restore/history_after.db
          retention-days: 14
