name: Install Facebook on Samsung Spoofed Emulator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-emulator:
    runs-on: ubuntu-latest   # macOS runners (macos-14/15) can't do HVF nested virtualization — Ubuntu + KVM is the working path
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Artifacts Storage Directory
        run: mkdir -p ${{ github.workspace }}/emulator-screenshots

      - name: AVD Cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-google_apis-x86_64-v2

      - name: Create AVD Snapshot (cache warm-up, no-op if cache hit)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64             # x86_64 is what gets KVM acceleration on Linux runners
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD created and cached."

      - name: Run, Spoof, and Install App
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -writable-system -camera-back none
          script: |
            echo "=== Initializing Host ADB Server ==="
            adb kill-server
            adb start-server

            echo "=== Waiting for Android Device Core Loop to Connect ==="
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do echo "Emulator is still booting... Checking again in 10 seconds."; sleep 10; done

            echo "=== Device Fully Booted! Starting Samsung Spoofing ==="
            # ro.* properties are write-once at boot from build.prop files — setprop can NEVER
            # overwrite them, even as root. We have to edit build.prop on disk and reboot instead.
            adb root
            adb wait-for-device
            adb remount

            echo "=== Rebooting so the writable overlay actually takes effect ==="
            adb reboot
            adb wait-for-device
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do echo "Waiting for post-remount reboot..."; sleep 5; done
            adb root
            adb wait-for-device
            adb remount

            echo "=== Patching build.prop with Samsung values ==="
            adb pull /system/build.prop /tmp/build.prop
            sed -i -e '/^ro\.product\.brand=/d' -e '/^ro\.product\.manufacturer=/d' -e '/^ro\.product\.model=/d' -e '/^ro\.product\.name=/d' -e '/^ro\.product\.device=/d' /tmp/build.prop
            printf 'ro.product.brand=samsung\nro.product.manufacturer=samsung\nro.product.model=SM-S938B\nro.product.name=s938bxx\nro.product.device=q6q\n' >> /tmp/build.prop
            adb push /tmp/build.prop /system/build.prop
            adb shell chmod 644 /system/build.prop

            echo "=== Rebooting to apply spoofed build.prop ==="
            adb reboot
            adb wait-for-device
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do echo "Waiting for post-spoof reboot..."; sleep 5; done

            echo "=== Verifying spoofed properties ==="
            adb shell getprop ro.product.brand
            adb shell getprop ro.product.model

            SAMSUNG_UA="Mozilla/5.0 (Linux; Android 16; SM-S938B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Mobile Safari/537.36 SamsungBrowser/30.0"
            adb shell "settings put global webview_user_agent '$SAMSUNG_UA'"

            echo "=== Downloading Facebook APK ==="
            # NOTE: this must point at an APK YOU host (e.g. a GitHub Release asset in this
            # repo, or something pulled via your rclone/Drive pipeline). There is no official
            # direct-download APK URL from Meta — the previous URL just saved github.com's HTML.
            curl -L -o facebook.apk "https://github.com/emily1517/test2android/releases/download/v1/facebook-569-0-0-42-72.apk"

            echo "=== Installing Facebook App ==="
            adb install -r -d facebook.apk

            echo "=== Launching Facebook App ==="
            adb shell input keyevent 82
            adb shell monkey -p com.facebook.katana -c android.intent.category.LAUNCHER 1

            echo "Giving Facebook 15 seconds to initialize..."
            sleep 15

            echo "=== Capturing Verification Screenshot ==="
            adb exec-out screencap -p > ${{ github.workspace }}/emulator-screenshots/facebook-samsung-success.png
            echo "Workflow process finished successfully!"

      - name: Upload Screenshot Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facebook-samsung-screenshot
          path: ${{ github.workspace }}/emulator-screenshots/
          retention-days: 7

      - name: Output Artifact Download Summary Link
        run: |
          echo "### 🚀 Facebook App Successfully Installed!" >> $GITHUB_STEP_SUMMARY
          echo "Your spoofed Samsung workspace has initialized the requested application." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **[Click Here to Open Run Summary to Download Artifacts File Package](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})**" >> $GITHUB_STEP_SUMMARY
