name: Install Facebook on Samsung Spoofed Emulator

on:
  workflow_dispatch:

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Artifacts Storage Directory
        run: mkdir -p ${{ github.workspace }}/emulator-screenshots backup

      - name: AVD Cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-google_apis-x86_64-v2

      - name: Create AVD Snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD created and cached."

      - name: Run, Spoof, Install, and Automate Facebook
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -writable-system -camera-back none
          script: |
            set -e
            echo "=== Boot emulator ==="
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do sleep 10; done

            echo "=== Spoof Samsung build.prop ==="
            adb root && adb wait-for-device && adb remount
            adb pull /system/build.prop /tmp/build.prop
            sed -i -e '/^ro\.product\.brand=/d' -e '/^ro\.product\.manufacturer=/d' -e '/^ro\.product\.model=/d' -e '/^ro\.product\.name=/d' -e '/^ro\.product\.device=/d' /tmp/build.prop
            printf 'ro.product.brand=samsung\nro.product.manufacturer=samsung\nro.product.model=SM-S938B\nro.product.name=s938bxx\nro.product.device=q6q\n' >> /tmp/build.prop
            adb push /tmp/build.prop /system/build.prop
            adb shell chmod 644 /system/build.prop
            adb reboot && adb wait-for-device
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do sleep 5; done

            echo "=== Download + Install Facebook APK ==="
            curl -L -o facebook.apk "https://github.com/emily1517/test2android/releases/download/v1/facebook-569-0-0-42-72.apk"
            adb install facebook.apk

            echo "=== Launch Facebook ==="
            PKG="com.facebook.katana"
            adb shell monkey -p "$PKG" -c android.intent.category.LAUNCHER 1
            adb shell screencap -p /sdcard/launch.png
            adb pull /sdcard/launch.png backup/launch.png

            DUMP="backup/window_dump_current.xml"
            refresh_dump() { adb shell uiautomator dump /sdcard/window_dump.xml; adb pull /sdcard/window_dump.xml "$DUMP"; }
            snapshot_dump() { cp "$DUMP" "backup/dump_$1.xml"; }

            echo "=== Step 1: wait for profile/login screen ==="
            for i in $(seq 1 20); do
              refresh_dump
              if grep -qi "already have a profile" "$DUMP"; then
                adb shell screencap -p /sdcard/profile_screen.png
                adb pull /sdcard/profile_screen.png backup/profile_screen.png
                snapshot_dump "profile_screen"
                COORDS=$(python3 ui_helpers.py "$DUMP" profile_button || true)
                if [ -n "$COORDS" ]; then
                  X=$(echo "$COORDS" | cut -d' ' -f1)
                  Y=$(echo "$COORDS" | cut -d' ' -f2)
                  adb shell input tap "$X" "$Y"
                fi
                break
              elif grep -Eqi 'log ?in|sign ?in|email|password' "$DUMP"; then
                adb shell screencap -p /sdcard/login_screen.png
                adb pull /sdcard/login_screen.png backup/login_screen.png
                snapshot_dump "login_screen"
                break
              fi
              sleep 3
            done

            echo "=== Step 2: fill email field ==="
            refresh_dump
            EMAIL_COORDS=$(python3 ui_helpers.py "$DUMP" email_field || true)
            if [ -n "$EMAIL_COORDS" ]; then
              EX=$(echo "$EMAIL_COORDS" | cut -d' ' -f1)
              EY=$(echo "$EMAIL_COORDS" | cut -d' ' -f2)
              adb shell input tap "$EX" "$EY"
              adb shell input text "testuser@example.com"
              adb shell screencap -p /sdcard/email_filled.png
              adb pull /sdcard/email_filled.png backup/email_filled.png
              snapshot_dump "email_filled"
            fi

            echo "=== Step 3: fill password field ==="
            refresh_dump
            PASS_COORDS=$(python3 ui_helpers.py "$DUMP" password_field || true)
            if [ -n "$PASS_COORDS" ]; then
              PX=$(echo "$PASS_COORDS" | cut -d' ' -f1)
              PY=$(echo "$PASS_COORDS" | cut -d' ' -f2)
              adb shell input tap "$PX" "$PY"
              adb shell input text "MySecretPass123"
              adb shell screencap -p /sdcard/password_filled.png
              adb pull /sdcard/password_filled.png backup/password_filled.png
              snapshot_dump "password_filled"
            fi

            echo "=== Step 4: tap Login button ==="
            refresh_dump
            LOGIN_COORDS=$(python3 ui_helpers.py "$DUMP" login_button || true)
            if [ -n "$LOGIN_COORDS" ]; then
              LX=$(echo "$LOGIN_COORDS" | cut -d' ' -f1)
              LY=$(echo "$LOGIN_COORDS" | cut -d' ' -f2)
              adb shell input tap "$LX" "$LY"
              adb shell screencap -p /sdcard/login_tapped.png
              adb pull /sdcard/login_tapped.png backup/login_tapped.png
              snapshot_dump "login_tapped"
            fi

            echo "=== Step 5: capture post-login screens ==="
            for j in $(seq 1 10); do
              sleep 3
              refresh_dump
              snapshot_dump "post_login_${j}"
              adb shell screencap -p /sdcard/post_login_${j}.png
              adb pull /sdcard/post_login_${j}.png backup/post_login_${j}.png
            done

      - name: Upload Screenshot Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facebook-samsung-screenshots
          path: backup/
          retention-days: 7

      - name: Output Artifact Download Summary Link
        run: |
          echo "### 🚀 Facebook Automation Complete!" >> $GITHUB_STEP_SUMMARY
          echo "Screenshots + XML dumps are available in artifacts." >> $GITHUB_STEP_SUMMARY
          echo "🔗 **[Download Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})**" >> $GITHUB_STEP_SUMMARY
