name: Facebook Screenshot Now

on:
  workflow_dispatch:

jobs:
  fb:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Setup + KVM
        run: |
          sudo apt-get update -q
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Facebook
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: |
            mkdir -p backup

            adb wait-for-device
            echo "Emulator booted successfully."

            # Install curl on emulator if needed + download APK
            echo "=== Downloading Facebook APK ==="
            adb shell "apt-get update && apt-get install -y curl" 2>/dev/null || true
            adb shell "curl -L -o /sdcard/fb.apk https://github.com/user-attachments/files/1234567890/facebook-x86_64.apk" || \
            echo "Download failed - use real link"

            echo "=== Installing Facebook ==="
            adb install -r /sdcard/fb.apk 2>&1 | tee backup/install.log

            echo "=== Taking home screenshot ==="
            adb shell screencap -p /sdcard/home.png
            adb pull /sdcard/home.png backup/home.png

            echo "=== Launching Facebook ==="
            adb shell am start -n com.facebook.katana/.LoginActivity || \
            adb shell monkey -p com.facebook.katana -c android.intent.category.LAUNCHER 1
            sleep 12

            echo "=== Taking Facebook Screenshot ==="
            adb shell screencap -p /sdcard/fb.png
            adb pull /sdcard/fb.png backup/facebook_screenshot.png

            adb shell dumpsys activity activities | grep -i resumed > backup/foreground.txt

      - name: Upload Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-screenshot
          path: backup/facebook_screenshot.png

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fb-debug-logs
          path: backup/
