name: Install Facebook on Samsung Spoofed Emulator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Artifacts Directory
        run: mkdir -p ${{ github.workspace }}/emulator-screenshots

      - name: AVD Cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-google_apis-x86_64-v2

      - name: Create AVD (if needed)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD cached."

      - name: Run Emulator + Samsung Spoof + Facebook Login
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -writable-system -camera-back none
          script: |
            set -e

            echo "=== Initializing ADB ==="
            adb kill-server
            adb start-server
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do sleep 10; done

            # === Samsung Spoofing (unchanged) ===
            adb root && adb wait-for-device && adb remount
            adb reboot && adb wait-for-device
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do sleep 5; done
            adb root && adb wait-for-device && adb remount

            adb pull /system/build.prop /tmp/build.prop
            sed -i -e '/^ro\.product\.brand=/d' -e '/^ro\.product\.manufacturer=/d' \
                   -e '/^ro\.product\.model=/d' -e '/^ro\.product\.name=/d' \
                   -e '/^ro\.product\.device=/d' /tmp/build.prop
            printf 'ro.product.brand=samsung\nro.product.manufacturer=samsung\nro.product.model=SM-S938B\nro.product.name=s938bxx\nro.product.device=q6q\n' >> /tmp/build.prop
            adb push /tmp/build.prop /system/build.prop
            adb shell chmod 644 /system/build.prop

            adb reboot && adb wait-for-device
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do sleep 5; done

            echo "Samsung spoofed: $(adb shell getprop ro.product.model)"

            # === Download & Install Facebook ===
            curl -L -o facebook.apk "https://github.com/emily1517/test2android/releases/download/v1/facebook-569-0-0-42-72.apk"
            adb install -r -d facebook.apk

            # ================ CREATE UI_HELPERS.PY ================
            echo "=== Creating ui_helpers.py ==="
            cat > ui_helpers.py << 'EOF'
#!/usr/bin/env python3
import sys
import xml.etree.ElementTree as ET
import re

def parse_dump(xml_path):
    tree = ET.parse(xml_path)
    return tree.getroot()

def get_bounds_center(node):
    bounds = node.get('bounds')
    if not bounds: return None
    m = re.match(r'\[(\d+),(\d+)\]\[(\d+),(\d+)\]', bounds)
    if m:
        x = (int(m.group(1)) + int(m.group(3))) // 2
        y = (int(m.group(2)) + int(m.group(4))) // 2
        return f"{x} {y}"
    return None

def find_node(root, **kwargs):
    for node in root.iter():
        match = True
        for k, v in kwargs.items():
            if k == 'text' and v.lower() not in (node.get('text') or '').lower():
                match = False
            elif k == 'resource_id' and node.get('resource-id') != v:
                match = False
            elif k == 'class' and node.get('class') != v:
                match = False
        if match:
            center = get_bounds_center(node)
            if center: return center
    return None

def find_profile_button(root):
    return find_node(root, text="already have") or find_node(root, text="I already have a profile")

def find_email_field(root):
    return (find_node(root, resource_id="com.facebook.katana:id/login_username") or
            find_node(root, class_="android.widget.EditText"))

def find_password_field(root):
    edits = [get_bounds_center(n) for n in root.iter() if n.get('class') == 'android.widget.EditText']
    return edits[1] if len(edits) >= 2 else (edits[0] if edits else None)

def get_editcount(root):
    return str(sum(1 for n in root.iter() if n.get('class') == 'android.widget.EditText'))

def get_field_value(root, idx=0):
    texts = [n.get('text') or '' for n in root.iter() if n.get('class') == 'android.widget.EditText']
    return texts[idx] if len(texts) > idx else ''

def find_login_button(root):
    for t in ["Log in", "Login", "Sign in", "Continue"]:
        if c := find_node(root, text=t): return c
    return find_node(root, class_="android.widget.Button")

def main():
    xml_path = sys.argv[1]
    cmd = sys.argv[2]
    root = parse_dump(xml_path)

    if cmd == "editcount":
        print(get_editcount(root))
    elif cmd == "email_field":
        print(find_email_field(root) or "")
    elif cmd == "password_field":
        print(find_password_field(root) or "")
    elif cmd == "login_button":
        print(find_login_button(root) or "")
    elif cmd == "profile_button":
        print(find_profile_button(root) or "")
    elif cmd == "field_value":
        print(get_field_value(root, int(sys.argv[3]) if len(sys.argv)>3 else 0))
    elif cmd == "dump_text_summary":
        texts = [n.get('text') or n.get('content-desc') or '' for n in root.iter() if n.get('text') or n.get('content-desc')]
        print("\n".join(texts[:100]))
    else:
        print("Unknown command")

if __name__ == "__main__":
    main()
EOF
