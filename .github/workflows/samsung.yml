name: Run Samsung Spoofed Emulator with Screenshots

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-emulator:
    runs-on: macos-13

    steps:
      - name: Checkout Repository
        uses: actions/actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Directory where screenshots will be saved on the host runner machine
      - name: Create Artifacts Storage Directory
        run: mkdir -p ${{ github.workspace }}/emulator-screenshots

      - name: Run and Configure Samsung Emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          disable-animations: true 
          emulator-options: -no-window -gpu off -no-audio -no-boot-anim -writable-system
          
          script: |
            echo "=== Emulator Booted! Starting Samsung Spoofing ==="
            adb root
            adb remount
            
            # Inject Samsung parameters
            adb shell "setprop ro.product.brand samsung"
            adb shell "setprop ro.product.manufacturer samsung"
            adb shell "setprop ro.product.model SM-S938B"
            adb shell "setprop ro.product.name s938b"
            adb shell "setprop ro.product.device qssi"
            
            # Global WebView User-Agent Force
            SAMSUNG_UA="Mozilla/5.0 (Linux; Android 16; SM-S938B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Mobile Safari/537.36 SamsungBrowser/30.0"
            adb shell "settings put global webview_user_agent '$SAMSUNG_UA'"
            
            # Restart Android container framework runtime
            adb shell "stop && start"
            sleep 15
            
            echo "=== Capture Emulator State Screenshot ==="
            # Captures the Android OS frame buffers directly and extracts to a clean local host PNG
            adb exec-out screencap -p > ${{ github.workspace }}/emulator-screenshots/samsung-device-success.png
            
            echo "Device masked. Picture taken successfully!"

      # Upload the taken image to secure GitHub Artifact cloud vaults
      - name: Upload Screenshot Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: samsung-emulator-verification-screens
          path: ${{ github.workspace }}/emulator-screenshots/
          retention-days: 7

      # Automatically prints out the direct layout page to quickly click and acquire files
      - name: Output Artifact Download Summary Link
        run: |
          echo "### 🚀 Samsung Emulator Environment Ready!" >> $GITHUB_STEP_SUMMARY
          echo "Your spoofed device configuration snapshot is captured." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **[Click Here to Open Run Summary to Download Artifacts File Package](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})**" >> $GITHUB_STEP_SUMMARY
