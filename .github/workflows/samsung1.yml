name: Install Facebook on Samsung Spoofed Emulator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Artifacts Directory
        run: mkdir -p ${{ github.workspace }}/emulator-screenshots

      - name: AVD Cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-google_apis-x86_64-v2

      - name: Create AVD (if needed)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD cached."

      - name: Run Emulator + Samsung Spoof + Facebook Login
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -writable-system -camera-back none
          script: |
            set -e

            echo "=== Initializing ADB ==="
            adb kill-server
            adb start-server
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do sleep 10; done

            # === Samsung Spoofing ===
            adb root && adb wait-for-device && adb remount
            adb reboot && adb wait-for-device
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do sleep 5; done
            adb root && adb wait-for-device && adb remount

            adb pull /system/build.prop /tmp/build.prop
            sed -i -e '/^ro\.product\.brand=/d' -e '/^ro\.product\.manufacturer=/d' -e '/^ro\.product\.model=/d' -e '/^ro\.product\.name=/d' -e '/^ro\.product\.device=/d' /tmp/build.prop
            printf 'ro.product.brand=samsung\nro.product.manufacturer=samsung\nro.product.model=SM-S938B\nro.product.name=s938bxx\nro.product.device=q6q\n' >> /tmp/build.prop
            adb push /tmp/build.prop /system/build.prop
            adb shell chmod 644 /system/build.prop

            adb reboot && adb wait-for-device
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do sleep 5; done

            echo "Samsung spoofed: $(adb shell getprop ro.product.model)"

            # === Download & Install Facebook ===
            curl -L -o facebook.apk "https://github.com/emily1517/test2android/releases/download/v1/facebook-569-0-0-42-72.apk"
            adb install -r -d facebook.apk

            echo "=== Using ui_helpers.py from repo ==="
            # ui_helpers.py is checked out with the repo (see scripts/ui_helpers.py) - no heredoc needed

            # ================ LOGIN AUTOMATION ================
            echo "=== Starting Facebook Login Automation ==="

            PKG="com.facebook.katana"
            EMAIL="janamoore@momnow.seedit.cfd"
            PASSWORD="Pygames@12369"

            mkdir -p backup

            # >>> PASTE YOUR LOGIN AUTOMATION STEPS HERE <<<
            # This section was placeholder comments in the original file - no actual
            # commands were present, so nothing populated backup/. Paste the real
            # adb/uiautomator steps here (launch app, tap fields, screenshot, etc.)

            echo "=== Waiting for post-login screen to settle ==="
            sleep 15

            echo "=== Capturing screenshot after login ==="
            adb exec-out screencap -p > backup/after_login.png
            echo "Screenshot saved: backup/after_login.png ($(wc -c < backup/after_login.png) bytes)"

            echo "=== Copying artifacts ==="
            cp -r backup/* ${{ github.workspace }}/emulator-screenshots/ 2>/dev/null || true

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: emulator-screenshots
          path: ${{ github.workspace }}/emulator-screenshots
          if-no-files-found: warn
