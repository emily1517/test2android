name: Facebook Screenshot Now

on:
  workflow_dispatch:

jobs:
  fb:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java + KVM
        run: |
          sudo apt-get update -q
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Facebook on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: |
            set -x
            mkdir -p backup

            adb wait-for-device
            echo "=== Installing Facebook ==="

            # Download latest Facebook x86_64 APK (update the ID if needed)
            adb shell "curl -L -o /sdcard/fb.apk 'https://www.apkmirror.com/wp-content/themes/APKMirror/download.php?id=XXXXXX'" || echo "Download failed"

            adb install -r /sdcard/fb.apk 2>&1 | tee backup/install.log

            echo "=== Launching Facebook ==="
            adb shell am start -n com.facebook.katana/com.facebook.katana.LoginActivity || \
            adb shell monkey -p com.facebook.katana -c android.intent.category.LAUNCHER 1
            sleep 15

            echo "=== Taking Screenshot ==="
            adb shell screencap -p /sdcard/fb.png
            adb pull /sdcard/fb.png backup/facebook_screenshot.png

            adb shell dumpsys activity activities | grep -i resumed > backup/foreground.txt || true

      - name: Upload Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-screenshot
          path: backup/facebook_screenshot.png
          retention-days: 7

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fb-logs
          path: backup/
