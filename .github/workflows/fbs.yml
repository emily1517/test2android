name: Android - Install and Screenshot Facebook

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  facebook:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-facebook

      - name: Create AVD (if needed)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo "AVD created."

      - name: Prepare and run Facebook script
        run: |
          mkdir -p backup
          cat > facebook.sh << 'EOF'
#!/bin/bash
set +e
adb devices
adb wait-for-device
adb root
adb wait-for-device

echo "=== Downloading Facebook APK (x86_64) ==="
# Find the exact direct download link from APKMirror for the latest x86_64 version
# Example (update the ID from https://www.apkmirror.com/apk/facebook-2/facebook/ )
adb shell "curl -L -o /sdcard/facebook.apk https://www.apkmirror.com/wp-content/themes/APKMirror/download.php?id=XXXXXX" || echo "Update the download URL/ID"

echo "=== Installing Facebook ==="
adb install -r /sdcard/facebook.apk 2>&1 | tee ./backup/install.log || echo "Install issues - check log"

echo "=== Home screenshot ==="
adb shell screencap -p /sdcard/00_home.png
adb pull /sdcard/00_home.png ./backup/00_home.png

echo "=== Launching Facebook ==="
adb shell am start -n com.facebook.katana/com.facebook.katana.LoginActivity || \
adb shell am start -a android.intent.action.MAIN -c android.intent.category.LAUNCHER -n com.facebook.katana/.LoginActivity
sleep 12

echo "=== Facebook launched screenshot ==="
adb shell screencap -p /sdcard/facebook_launched.png
adb pull /sdcard/facebook_launched.png ./backup/facebook_launched.png

echo "=== Foreground app check ==="
adb shell dumpsys activity activities | grep -i "mResumedActivity" | tee ./backup/resumed.txt

echo "=== Done ==="
exit 0
EOF
          chmod +x facebook.sh

      - name: Run on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash ${{ github.workspace }}/facebook.sh

      - name: Show results
        run: |
          ls -lh backup/
          cat backup/resumed.txt 2>/dev/null || true
          cat backup/install.log 2>/dev/null || true

      - name: Upload Facebook Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-launched-screenshot
          path: backup/facebook_launched.png
          retention-days: 14

      - name: Upload All Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-full-backup
          path: backup/
          retention-days: 14
