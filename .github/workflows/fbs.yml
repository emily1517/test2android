name: Android - Install Facebook APK (screenshot proof)
on:
  workflow_dispatch:

env:
  EMAIL: "marlenebarhorst@momnow.seedit.cfd"
  PASSWORD: "Pygames@12369"

jobs:
  install-and-screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download Facebook APK
        run: |
          mkdir -p apk backup
          curl -L -o apk/facebook.apk \
            "https://github.com/emily1517/test2android/releases/download/v1/facebook-569-0-0-42-72.apk"
          ls -lh apk/

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34

      - name: Create AVD (if not cached)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo "AVD created."

      - name: Write UI helper script (parses uiautomator XML properly)
        run: |
          cat > ui_helpers.py << 'PYEOF'
          import sys, re
          import xml.etree.ElementTree as ET

          def bounds_center(bounds):
              m = re.match(r"\[(\d+),(\d+)\]\[(\d+),(\d+)\]", bounds or "")
              if not m:
                  return None
              x1, y1, x2, y2 = map(int, m.groups())
              return ((x1 + x2) // 2, (y1 + y2) // 2)

          def all_nodes(root):
              return list(root.iter("node"))

          def main():
              path, mode = sys.argv[1], sys.argv[2]
              try:
                  root = ET.parse(path).getroot()
              except ET.ParseError:
                  print("")
                  return
              nodes = all_nodes(root)
              edit_nodes = [n for n in nodes if n.get("class") == "android.widget.EditText"]

              if mode == "profile_button":
                  for n in nodes:
                      blob = ((n.get("text") or "") + " " + (n.get("content-desc") or "")).lower()
                      if "already have a profile" in blob:
                          c = bounds_center(n.get("bounds"))
                          if c:
                              print(f"{c[0]} {c[1]}")
                              return
                  print("")

              elif mode == "editcount":
                  print(len(edit_nodes))

              elif mode in ("email_field", "password_field"):
                  keyword = "email" if mode == "email_field" else "password"
                  for n in edit_nodes:
                      blob = " ".join([
                          n.get("resource-id") or "",
                          n.get("text") or "",
                          n.get("content-desc") or "",
                      ]).lower()
                      if keyword in blob:
                          c = bounds_center(n.get("bounds"))
                          if c:
                              print(f"{c[0]} {c[1]}")
                              return
                  # Fallback: positional (1st field = email/mobile, 2nd = password)
                  if edit_nodes:
                      idx = 0 if mode == "email_field" else (1 if len(edit_nodes) > 1 else 0)
                      c = bounds_center(edit_nodes[idx].get("bounds"))
                      if c:
                          print(f"{c[0]} {c[1]}")
                          return
                  print("")

              elif mode == "field_value":
                  idx = int(sys.argv[3])
                  if idx < len(edit_nodes):
                      print(edit_nodes[idx].get("text") or "")
                  else:
                      print("")

              elif mode == "login_button":
                  for n in nodes:
                      blob = " ".join([
                          n.get("text") or "",
                          n.get("content-desc") or "",
                          n.get("resource-id") or "",
                      ]).lower()
                      if re.search(r"log ?in|sign ?in", blob):
                          c = bounds_center(n.get("bounds"))
                          if c:
                              print(f"{c[0]} {c[1]}")
                              return
                  print("")

              else:
                  print("")

          if __name__ == "__main__":
              main()
          PYEOF

      - name: Write install-and-launch script
        run: |
          cat > run.sh << 'EOF'
          #!/bin/bash
          set -x
          adb wait-for-device
          adb shell input keyevent 82

          echo "=== Installing APK ==="
          adb install -r apk/facebook.apk

          echo "=== Confirming package is present ==="
          adb shell pm list packages > backup/all_packages.txt
          PKG=$(grep -i facebook backup/all_packages.txt | head -n1 | sed 's/^package://' | tr -d '\r')
          echo "Resolved package: [$PKG]"
          echo "$PKG" > backup/package_check.txt

          if [ -z "$PKG" ]; then
            echo "ERROR: package not found after install"
            adb shell screencap -p /sdcard/facebook_installed.png
            adb pull /sdcard/facebook_installed.png backup/facebook_installed.png
            exit 0
          fi

          echo "=== Launching app via monkey (category LAUNCHER) ==="
          adb shell monkey -p "$PKG" -c android.intent.category.LAUNCHER 1

          DUMP="backup/window_dump_current.xml"

          # Redump the live UI hierarchy into $DUMP
          refresh_dump() {
            adb shell uiautomator dump /sdcard/window_dump.xml > /dev/null 2>&1
            adb pull /sdcard/window_dump.xml "$DUMP" > /dev/null 2>&1
          }

          # wait_for <description> <check-command-string> <max-attempts> <interval-seconds>
          # check-command-string is eval'd after each refresh_dump; return 0 = found
          wait_for() {
            local desc="$1" check="$2" max="$3" interval="$4"
            local n=0
            while [ "$n" -lt "$max" ]; do
              refresh_dump
              if eval "$check"; then
                echo "=== Found: $desc (elapsed ~$((n * interval))s) ==="
                return 0
              fi
              echo "--- Still waiting for: $desc (elapsed ~$((n * interval))s) ---"
              sleep "$interval"
              n=$((n + 1))
            done
            echo "!!! TIMEOUT waiting for: $desc !!!"
            return 1
          }

          echo "=== Step 1: wait for either 'I already have a profile' OR a real login field to appear ==="
          wait_for "profile/login screen (post-splash)" \
            'grep -qi "already have a profile" "$DUMP" || [ "$(python3 ui_helpers.py "$DUMP" editcount)" -ge 1 ]' \
            20 3

          if grep -qi "already have a profile" "$DUMP"; then
            echo "=== 'I already have a profile' screen detected — screenshotting ==="
            adb shell screencap -p /sdcard/profile_screen.png
            adb pull /sdcard/profile_screen.png backup/profile_screen.png

            COORDS=$(python3 ui_helpers.py "$DUMP" profile_button)
            if [ -n "$COORDS" ]; then
              TAP_X=$(echo "$COORDS" | cut -d' ' -f1)
              TAP_Y=$(echo "$COORDS" | cut -d' ' -f2)
              echo "=== Tapping 'I already have a profile' at ($TAP_X, $TAP_Y) ==="
              adb shell input tap "$TAP_X" "$TAP_Y"

              echo "=== Waiting for real login fields to appear after the tap ==="
              wait_for "login form (EditText fields)" \
                '[ "$(python3 ui_helpers.py "$DUMP" editcount)" -ge 1 ]' \
                15 2

              echo "=== Screenshotting after tapping profile option ==="
              adb shell screencap -p /sdcard/after_profile_tap.png
              adb pull /sdcard/after_profile_tap.png backup/after_profile_tap.png
            else
              echo "!!! Could not parse bounds for 'I already have a profile' node !!!"
            fi
          else
            echo "=== Login form appeared directly (no separate profile screen) ==="
          fi

          echo "=== Screenshotting login screen ==="
          adb shell screencap -p /sdcard/login_screen.png
          adb pull /sdcard/login_screen.png backup/login_screen.png

          echo "=== Step 2: fill email field (with verification + retry) ==="
          EMAIL_FILLED=0
          for attempt in 1 2 3; do
            refresh_dump
            EMAIL_COORDS=$(python3 ui_helpers.py "$DUMP" email_field)
            if [ -z "$EMAIL_COORDS" ]; then
              echo "!!! Attempt $attempt: could not locate email field, retrying... !!!"
              sleep 2
              continue
            fi
            EX=$(echo "$EMAIL_COORDS" | cut -d' ' -f1)
            EY=$(echo "$EMAIL_COORDS" | cut -d' ' -f2)
            echo "=== Attempt $attempt: tapping email field at ($EX, $EY) ==="
            adb shell input tap "$EX" "$EY"
            sleep 1
            adb shell input text "${EMAIL//@/\\@}"
            sleep 1

            refresh_dump
            VALUE=$(python3 ui_helpers.py "$DUMP" field_value 0)
            if [ -n "$VALUE" ]; then
              echo "=== Email field verified non-empty: [$VALUE] ==="
              EMAIL_FILLED=1
              break
            fi
            echo "!!! Email field still empty after typing, retrying (attempt $attempt) !!!"
          done
          [ "$EMAIL_FILLED" -eq 0 ] && echo "!!! WARNING: email field could not be verified as filled !!!"

          echo "=== Step 3: fill password field (with verification + retry) ==="
          PASSWORD_FILLED=0
          for attempt in 1 2 3; do
            refresh_dump
            PASS_COORDS=$(python3 ui_helpers.py "$DUMP" password_field)
            if [ -z "$PASS_COORDS" ]; then
              echo "!!! Attempt $attempt: could not locate password field, retrying... !!!"
              sleep 2
              continue
            fi
            PX=$(echo "$PASS_COORDS" | cut -d' ' -f1)
            PY=$(echo "$PASS_COORDS" | cut -d' ' -f2)
            echo "=== Attempt $attempt: tapping password field at ($PX, $PY) ==="
            adb shell input tap "$PX" "$PY"
            sleep 1
            adb shell input text "${PASSWORD//@/\\@}"
            sleep 1

            refresh_dump
            VALUE=$(python3 ui_helpers.py "$DUMP" field_value 1)
            if [ -n "$VALUE" ]; then
              echo "=== Password field verified non-empty ==="
              PASSWORD_FILLED=1
              break
            fi
            echo "!!! Password field still empty after typing, retrying (attempt $attempt) !!!"
          done
          [ "$PASSWORD_FILLED" -eq 0 ] && echo "!!! WARNING: password field could not be verified as filled !!!"

          echo "=== Screenshotting after entering credentials ==="
          adb shell screencap -p /sdcard/after_credentials_entered.png
          adb pull /sdcard/after_credentials_entered.png backup/after_credentials_entered.png

          # Dismiss keyboard so it doesn't cover the login button
          adb shell input keyevent 111
          sleep 1

          echo "=== Step 4: wait for and tap Login button ==="
          LOGIN_DONE=0
          if [ "$EMAIL_FILLED" -eq 1 ] && [ "$PASSWORD_FILLED" -eq 1 ]; then
            wait_for "Login button" \
              '[ -n "$(python3 ui_helpers.py "$DUMP" login_button)" ]' \
              10 2

            LOGIN_BTN_COORDS=$(python3 ui_helpers.py "$DUMP" login_button)
            if [ -n "$LOGIN_BTN_COORDS" ]; then
              LBX=$(echo "$LOGIN_BTN_COORDS" | cut -d' ' -f1)
              LBY=$(echo "$LOGIN_BTN_COORDS" | cut -d' ' -f2)
              echo "=== Tapping Login button at ($LBX, $LBY) ==="
              adb shell input tap "$LBX" "$LBY"
              LOGIN_DONE=1

              sleep 3
              echo "=== Screenshotting after login tap ==="
              adb shell screencap -p /sdcard/after_login_tap.png
              adb pull /sdcard/after_login_tap.png backup/after_login_tap.png
            else
              echo "!!! Could not find Login button bounds !!!"
            fi
          else
            echo "!!! Skipping Login tap because email/password were not confirmed filled !!!"
          fi

          echo "=== Confirming resumed activity ==="
          adb shell dumpsys activity activities | grep -i mResumedActivity | tee backup/resumed_activity.txt

          echo "=== Final screenshot ==="
          adb shell screencap -p /sdcard/facebook_installed.png
          adb pull /sdcard/facebook_installed.png backup/facebook_installed.png
          exit 0
          EOF
          chmod +x run.sh

      - name: Boot emulator, install APK, screenshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash ${{ github.workspace }}/run.sh

      - name: Show captured files
        if: always()
        run: |
          ls -lh backup/ || echo "backup dir empty or missing"
          echo "--- package_check.txt ---"
          cat backup/package_check.txt 2>/dev/null || echo "(none)"
          echo "--- resumed_activity.txt ---"
          cat backup/resumed_activity.txt 2>/dev/null || echo "(none)"

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-install-screenshot
          path: |
            backup/facebook_installed.png
            backup/profile_screen.png
            backup/after_profile_tap.png
            backup/login_screen.png
            backup/after_credentials_entered.png
            backup/after_login_tap.png
            backup/package_check.txt
            backup/all_packages.txt
            backup/resumed_activity.txt
          retention-days: 14
          if-no-files-found: warn
