name: Facebook Screenshot

on:
  workflow_dispatch:

jobs:
  fb:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger

      - name: Download & Run
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            mkdir -p backup
            adb wait-for-device

            # Download directly on host and push
            curl -L -o facebook.apk "https://github.com/emily1517/test2android/releases/download/v1/facebook.apk" || echo "No APK at that URL"
            adb push facebook.apk /sdcard/facebook.apk

            adb install -r /sdcard/facebook.apk 2>&1 | tee backup/install.log

            adb shell screencap -p /sdcard/home.png && adb pull /sdcard/home.png backup/
            adb shell am start -n com.facebook.katana/.LoginActivity || true
            sleep 10
            adb shell screencap -p /sdcard/fb.png && adb pull /sdcard/fb.png backup/facebook_screenshot.png

      - name: Upload Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-screenshot
          path: backup/facebook_screenshot.png
