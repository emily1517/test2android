name: Android Emulator Backup - Browser History
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34

      - name: Create AVD (if not cached)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo "AVD created."

      - name: Write browse-and-screenshot script
        run: |
          mkdir -p screenshots
          cat > browse.sh << 'EOF'
          #!/bin/bash
          set -e
          adb devices
          adb wait-for-device
          adb root
          adb wait-for-device

          # Open a few pages in the built-in Browser app to build history
          for url in "https://en.wikipedia.org/wiki/Android_(operating_system)" \
                     "https://www.wikipedia.org" \
                     "https://developer.android.com"; do
            echo "Opening: $url"
            adb shell am start -a android.intent.action.VIEW -n com.android.browser/.BrowserActivity -d "'$url'"
            sleep 6
          done

          echo "=== Dumping browser history DB (before backup) ==="
          adb pull /data/data/com.android.browser/databases/browser2.db ./screenshots/history_before.db || echo "history db pull failed, continuing"

          echo "=== Taking screenshot of last page ==="
          adb shell screencap -p /sdcard/before.png
          adb pull /sdcard/before.png ./screenshots/before.png
          EOF
          chmod +x browse.sh

      - name: Boot emulator, browse, screenshot, shut down
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash ${{ github.workspace }}/browse.sh

      - name: Kill emulator cleanly and archive AVD
        run: |
          adb emu kill || true
          sleep 5
          mkdir -p backup
          tar -czf backup/avd-backup.tar.gz -C ~/.android avd
          ls -lh backup/

      - name: Upload backup + screenshot as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: avd-backup-and-screenshots
          path: |
            backup/avd-backup.tar.gz
            screenshots/before.png
            screenshots/history_before.db
          retention-days: 14

      - name: Publish backup as a GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: avd-backup-${{ github.run_id }}
          name: AVD Backup ${{ github.run_id }}
          files: |
            backup/avd-backup.tar.gz
            screenshots/before.png
            screenshots/history_before.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
