name: Facebook Screenshot Now

on:
  workflow_dispatch:

jobs:
  fb:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger

      - name: Install & Launch Facebook
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: |
            mkdir -p backup

            adb wait-for-device

            curl -L -o facebook.apk "https://github.com/emily1517/test2android/releases/download/v1/facebook-569-0-0-42-72.apk"

            echo "Pushing APK..."
            adb push facebook.apk /data/local/tmp/facebook.apk

            echo "=== Installing ==="
            ls -l /data/local/tmp/ | tee backup/push_check.txt
            adb install -r /data/local/tmp/facebook.apk 2>&1 | tee backup/install.log

            echo "=== Home Screenshot ==="
            adb shell screencap -p /sdcard/home.png
            adb pull /sdcard/home.png backup/home.png

            echo "=== Trying to Launch Facebook ==="
            adb shell pm list packages | grep facebook | tee backup/packages.txt
            adb shell am start -n com.facebook.katana/.LoginActivity || true
            sleep 12

            echo "=== Final Screenshot ==="
            adb shell screencap -p /sdcard/fb.png
            adb pull /sdcard/fb.png backup/facebook_launched.png
