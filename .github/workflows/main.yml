name: Android - Backup Browser History (lightweight)
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34

      - name: Create AVD (if not cached)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo "AVD created."

      - name: Write browse-and-capture script
        run: |
          mkdir -p backup
          cat > browse.sh << 'EOF'
          #!/bin/bash
          set -e
          adb devices
          adb wait-for-device
          adb root
          adb wait-for-device

          for url in "https://en.wikipedia.org/wiki/Android_(operating_system)" \
                     "https://www.wikipedia.org" \
                     "https://developer.android.com"; do
            echo "Opening: $url"
            adb shell am start -a android.intent.action.VIEW -n com.android.browser/.BrowserActivity -d "'$url'"
            sleep 6
          done

          echo "=== Pulling browser history DB ==="
          adb pull /data/data/com.android.browser/databases/browser2.db ./backup/history_before.db

          echo "=== Screenshot after browsing ==="
          adb shell screencap -p /sdcard/before.png
          adb pull /sdcard/before.png ./backup/before.png
          EOF
          chmod +x browse.sh

      - name: Boot emulator, browse, capture, shut down
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash ${{ github.workspace }}/browse.sh

      - name: List captured backup files
        run: ls -lh backup/

      - name: Upload backup as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: history-backup
          path: |
            backup/history_before.db
            backup/before.png
          retention-days: 14

      - name: Publish backup as a GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: history-backup-${{ github.run_id }}
          name: History Backup ${{ github.run_id }}
          files: |
            backup/history_before.db
            backup/before.png
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
