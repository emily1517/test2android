name: Install Facebook on Samsung Spoofed Emulator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Artifacts Storage Directory
        run: mkdir -p ${{ github.workspace }}/emulator-screenshots

      - name: AVD Cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-google_apis-x86_64-v2

      - name: Create AVD Snapshot (cache warm-up, no-op if cache hit)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD created and cached."

      - name: Run, Spoof, and Install App + Automated Login
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -writable-system -camera-back none
          script: |
            echo "=== Initializing Host ADB Server ==="
            adb kill-server
            adb start-server

            echo "=== Waiting for Android Device Core Loop to Connect ==="
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do echo "Emulator is still booting... Checking again in 10 seconds."; sleep 10; done

            echo "=== Device Fully Booted! Starting Samsung Spoofing ==="
            adb root
            adb wait-for-device
            adb remount

            echo "=== Rebooting so the writable overlay actually takes effect ==="
            adb reboot
            adb wait-for-device
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do echo "Waiting for post-remount reboot..."; sleep 5; done
            adb root
            adb wait-for-device
            adb remount

            echo "=== Patching build.prop with Samsung values ==="
            adb pull /system/build.prop /tmp/build.prop
            sed -i -e '/^ro\.product\.brand=/d' -e '/^ro\.product\.manufacturer=/d' -e '/^ro\.product\.model=/d' -e '/^ro\.product\.name=/d' -e '/^ro\.product\.device=/d' /tmp/build.prop
            printf 'ro.product.brand=samsung\nro.product.manufacturer=samsung\nro.product.model=SM-S938B\nro.product.name=s938bxx\nro.product.device=q6q\n' >> /tmp/build.prop
            adb push /tmp/build.prop /system/build.prop
            adb shell chmod 644 /system/build.prop

            echo "=== Rebooting to apply spoofed build.prop ==="
            adb reboot
            adb wait-for-device
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do echo "Waiting for post-spoof reboot..."; sleep 5; done

            echo "=== Verifying spoofed properties ==="
            adb shell getprop ro.product.brand
            adb shell getprop ro.product.model

            SAMSUNG_UA="Mozilla/5.0 (Linux; Android 16; SM-S938B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Mobile Safari/537.36 SamsungBrowser/30.0"
            adb shell "settings put global webview_user_agent '$SAMSUNG_UA'"

            echo "=== Downloading Facebook APK ==="
            curl -L -o facebook.apk "https://github.com/emily1517/test2android/releases/download/v1/facebook-569-0-0-42-72.apk"

            echo "=== Verifying downloaded file is a real APK ==="
            ls -la facebook.apk
            file facebook.apk
            unzip -l facebook.apk | head -5 || echo "WARNING: facebook.apk is not a valid zip/apk — download likely returned an error page, not the real file."

            echo "=== Home screen BEFORE install (baseline) ==="
            adb exec-out screencap -p > ${{ github.workspace }}/emulator-screenshots/01-home-before-install.png

            echo "=== Installing Facebook App ==="
            adb install -r -d facebook.apk 2>&1 | tee /tmp/install-output.txt

            echo "=== Confirming package is actually present on device ==="
            adb shell pm list packages | grep -i facebook > /tmp/pkg-check.txt || echo "com.facebook.katana NOT found in installed packages list." > /tmp/pkg-check.txt
            cat /tmp/pkg-check.txt

            # ================ LOGIN AUTOMATION STARTS HERE ================
            echo "=== Setting up login automation ==="

            # Create backup directory
            mkdir -p backup

            # Make ui_helpers.py executable
            chmod +x ui_helpers.py

            # Define variables (CHANGE THESE WITH YOUR CREDENTIALS)
            PKG="com.facebook.katana"
            EMAIL="your_email@example.com"          # ←←← CHANGE THIS
            PASSWORD="your_password_here"           # ←←← CHANGE THIS

            echo "=== Launching app via monkey (category LAUNCHER) ==="
            adb shell monkey -p "$PKG" -c android.intent.category.LAUNCHER 1

            DUMP="backup/window_dump_current.xml"
            refresh_dump() {
              adb shell uiautomator dump /sdcard/window_dump.xml > /dev/null 2>&1
              adb pull /sdcard/window_dump.xml "$DUMP" > /dev/null 2>&1
            }

            snapshot_dump() {
              local label="$1"
              cp "$DUMP" "backup/dump_${label}.xml"
              python3 ui_helpers.py "$DUMP" dump_text_summary > "backup/dump_${label}_summary.txt"
            }

            wait_for() {
              local desc="$1" check="$2" max="$3" interval="$4"
              local n=0
              while [ "$n" -lt "$max" ]; do
                refresh_dump
                if eval "$check"; then
                  echo "=== Found: $desc (elapsed ~$((n * interval))s) ==="
                  return 0
                fi
                echo "--- Still waiting for: $desc (elapsed ~$((n * interval))s) ---"
                sleep "$interval"
                n=$((n + 1))
              done
              echo "!!! TIMEOUT waiting for: $desc !!!"
              return 1
            }

            clear_and_focus_field() {
              local x="$1" y="$2"
              adb shell input tap "$x" "$y"
              sleep 1
              adb shell input keyevent 123
              for _ in $(seq 1 40); do
                adb shell input keyevent 67
              done
            }

            echo "=== Step 1: wait for either 'I already have a profile' OR a real login field to appear ==="
            wait_for "profile/login screen (post-splash)" \
              'grep -qi "already have a profile" "$DUMP" || [ "$(python3 ui_helpers.py "$DUMP" editcount)" -ge 1 ]' \
              20 3
            snapshot_dump "step1_initial"

            if grep -qi "already have a profile" "$DUMP"; then
              echo "=== 'I already have a profile' screen detected — screenshotting ==="
              adb shell screencap -p /sdcard/profile_screen.png
              adb pull /sdcard/profile_screen.png backup/profile_screen.png
              COORDS=$(python3 ui_helpers.py "$DUMP" profile_button)
              if [ -n "$COORDS" ]; then
                TAP_X=$(echo "$COORDS" | cut -d' ' -f1)
                TAP_Y=$(echo "$COORDS" | cut -d' ' -f2)
                echo "=== Tapping 'I already have a profile' at ($TAP_X, $TAP_Y) ==="
                adb shell input tap "$TAP_X" "$TAP_Y"
                echo "=== Waiting for real login fields to appear after the tap ==="
                wait_for "login form (EditText fields)" \
                  '[ "$(python3 ui_helpers.py "$DUMP" editcount)" -ge 1 ]' \
                  15 2
                snapshot_dump "step2_after_profile_tap"
                echo "=== Screenshotting after tapping profile option ==="
                adb shell screencap -p /sdcard/after_profile_tap.png
                adb pull /sdcard/after_profile_tap.png backup/after_profile_tap.png
              else
                echo "!!! Could not parse bounds for 'I already have a profile' node !!!"
              fi
            else
              echo "=== Login form appeared directly (no separate profile screen) ==="
            fi

            echo "=== Screenshotting login screen ==="
            adb shell screencap -p /sdcard/login_screen.png
            adb pull /sdcard/login_screen.png backup/login_screen.png
            snapshot_dump "step3_login_screen"

            echo "=== Step 2: fill email field ==="
            EMAIL_FILLED=0
            for attempt in 1 2 3; do
              refresh_dump
              EMAIL_COORDS=$(python3 ui_helpers.py "$DUMP" email_field)
              if [ -z "$EMAIL_COORDS" ]; then
                echo "!!! Attempt $attempt: could not locate email field, retrying... !!!"
                sleep 2
                continue
              fi
              EX=$(echo "$EMAIL_COORDS" | cut -d' ' -f1)
              EY=$(echo "$EMAIL_COORDS" | cut -d' ' -f2)
              echo "=== Attempt $attempt: clearing + tapping email field at ($EX, $EY) ==="
              clear_and_focus_field "$EX" "$EY"
              adb shell input text "${EMAIL//@/\\@}"
              sleep 1
              refresh_dump
              VALUE=$(python3 ui_helpers.py "$DUMP" field_value 0)
              echo "=== Email field now reads: [$VALUE] (expected: [$EMAIL]) ==="
              if [ "$VALUE" = "$EMAIL" ]; then
                echo "=== Email field verified EXACT match ==="
                EMAIL_FILLED=1
                break
              fi
              echo "!!! Email field mismatch, retrying (attempt $attempt) !!!"
            done

            echo "=== Step 3: fill password field ==="
            PASSWORD_FILLED=0
            for attempt in 1 2 3; do
              refresh_dump
              PASS_COORDS=$(python3 ui_helpers.py "$DUMP" password_field)
              if [ -z "$PASS_COORDS" ]; then
                echo "!!! Attempt $attempt: could not locate password field, retrying... !!!"
                sleep 2
                continue
              fi
              PX=$(echo "$PASS_COORDS" | cut -d' ' -f1)
              PY=$(echo "$PASS_COORDS" | cut -d' ' -f2)
              echo "=== Attempt $attempt: clearing + tapping password field at ($PX, $PY) ==="
              clear_and_focus_field "$PX" "$PY"
              adb shell input text "${PASSWORD//@/\\@}"
              sleep 1
              refresh_dump
              VALUE=$(python3 ui_helpers.py "$DUMP" field_value 1)
              LEN=${#VALUE}
              echo "=== Password field now has $LEN char(s) ==="
              if [ -n "$VALUE" ]; then
                PASSWORD_FILLED=1
                break
              fi
              echo "!!! Password field still empty, retrying (attempt $attempt) !!!"
            done

            echo "=== Screenshotting after entering credentials ==="
            adb shell screencap -p /sdcard/after_credentials_entered.png
            adb pull /sdcard/after_credentials_entered.png backup/after_credentials_entered.png
            snapshot_dump "step4_after_credentials"

            adb shell input keyevent 111
            sleep 1

            echo "=== Step 4: wait for and tap Login button ==="
            LOGIN_DONE=0
            if [ "$EMAIL_FILLED" -eq 1 ] && [ "$PASSWORD_FILLED" -eq 1 ]; then
              wait_for "Login button" \
                '[ -n "$(python3 ui_helpers.py "$DUMP" login_button)" ]' \
                10 2
              LOGIN_BTN_COORDS=$(python3 ui_helpers.py "$DUMP" login_button)
              if [ -n "$LOGIN_BTN_COORDS" ]; then
                LBX=$(echo "$LOGIN_BTN_COORDS" | cut -d' ' -f1)
                LBY=$(echo "$LOGIN_BTN_COORDS" | cut -d' ' -f2)
                echo "=== Tapping Login button at ($LBX, $LBY) ==="
                adb shell input tap "$LBX" "$LBY"
                LOGIN_DONE=1
              else
                echo "!!! Could not find Login button bounds !!!"
              fi
            else
              echo "!!! Skipping Login tap because fields were not confirmed filled !!!"
            fi

            echo "=== Step 5: debug-capture post-login screens ==="
            for j in $(seq 1 10); do
              sleep 3
              refresh_dump
              snapshot_dump "step5_post_login_${j}"
              adb shell screencap -p /sdcard/post_login_${j}.png
              adb pull /sdcard/post_login_${j}.png "backup/post_login_${j}.png"
              echo "--- Post-login capture ${j} done ---"
            done

            echo "=== Confirming resumed activity ==="
            adb shell dumpsys activity activities | grep -i mResumedActivity | tee backup/resumed_activity.txt
            # ================ LOGIN AUTOMATION ENDS HERE ================

            echo "=== Copying all backup artifacts ==="
            cp -r backup/* ${{ github.workspace }}/emulator-screenshots/ 2>/dev/null || true

            echo "Workflow finished — check artifacts for screenshots and logs."
