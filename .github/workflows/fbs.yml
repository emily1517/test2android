name: Facebook Screenshot Now

on:
  workflow_dispatch:

jobs:
  fb:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger

      - name: Facebook Install & Screenshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: |
            mkdir -p backup

            adb wait-for-device

            curl -L -o facebook.apk "https://github.com/emily1517/test2android/releases/download/v1/facebook-569-0-0-42-72.apk"

            echo "=== Pushing APK ==="
            adb push facebook.apk /sdcard/Download/facebook.apk

            echo "=== Installing ==="
            adb install -r /sdcard/Download/facebook.apk 2>&1 | tee backup/install.log

            adb shell pm list packages | grep -i facebook | tee backup/packages.txt

            echo "=== Home Screenshot ==="
            adb shell screencap -p /sdcard/home.png
            adb pull /sdcard/home.png backup/

            echo "=== Launching ==="
            adb shell monkey -p com.facebook.katana -c android.intent.category.LAUNCHER 1 || true
            sleep 15

            echo "=== Final Screenshot ==="
            adb shell screencap -p /sdcard/fb.png
            adb pull /sdcard/fb.png backup/facebook_launched.png
