name: Android - Facebook Screenshot (Simple)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  facebook:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM (important for emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm || echo "KVM device not found"

      - name: Prepare Facebook Script
        run: |
          mkdir -p backup
          cat > facebook.sh << 'EOF'
#!/bin/bash
set +e
echo "=== Waiting for device ==="
adb wait-for-device
adb root || true
sleep 3

echo "=== Installing Facebook (using wget inside emulator) ==="
# Use a reliable x86_64 APK link - update if needed
adb shell "curl -L -o /sdcard/facebook.apk https://www.apkmirror.com/wp-content/themes/APKMirror/download.php?id=XXXX" || echo "Download failed - update link"

adb install -r /sdcard/facebook.apk 2>&1 | tee ./backup/install.log

echo "=== Home screenshot ==="
adb shell screencap -p /sdcard/home.png
adb pull /sdcard/home.png ./backup/home.png

echo "=== Launch Facebook ==="
adb shell am start -n com.facebook.katana/com.facebook.katana.LoginActivity || \
adb shell monkey -p com.facebook.katana -c android.intent.category.LAUNCHER 1
sleep 15

echo "=== Facebook Screenshot ==="
adb shell screencap -p /sdcard/facebook.png
adb pull /sdcard/facebook.png ./backup/facebook_launched.png

adb shell dumpsys activity activities | grep mResumedActivity | tee ./backup/foreground.txt

echo "=== Finished ==="
EOF
          chmod +x facebook.sh

      - name: Run Emulator + Facebook
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: bash ${{ github.workspace }}/facebook.sh

      - name: Upload Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-screenshot
          path: backup/facebook_launched.png
          retention-days: 7
